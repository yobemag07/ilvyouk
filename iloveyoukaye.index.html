<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILOVEYOUKAYE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05020a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Fade-in animation for page load */
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            animation: fadeIn 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; filter: blur(10px); }
            100% { opacity: 1; filter: blur(0px); }
        }

        /* Background Stars Canvas */
        #starCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Particle Canvas */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Main Heart Wrapper with Pulsing Animation */
        #heartContainer {
            position: relative;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulse 2.8s ease-in-out infinite;
            filter: drop-shadow(0 0 25px rgba(255, 40, 100, 0.45));
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                filter: drop-shadow(0 0 20px rgba(255, 40, 100, 0.4));
            }
            15% {
                transform: scale(1.08);
                filter: drop-shadow(0 0 35px rgba(255, 80, 140, 0.7));
            }
            30% {
                transform: scale(0.98);
                filter: drop-shadow(0 0 22px rgba(255, 40, 100, 0.45));
            }
            45% {
                transform: scale(1.04);
                filter: drop-shadow(0 0 30px rgba(255, 60, 120, 0.6));
            }
            60% {
                transform: scale(1);
                filter: drop-shadow(0 0 20px rgba(255, 40, 100, 0.4));
            }
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 20px rgba(255, 40, 100, 0.4));
            }
        }

        /* Canvas holding the text heart */
        #heartCanvas {
            display: block;
        }
    </style>
</head>
<body>

    <div id="container">
        <canvas id="starCanvas"></canvas>
        <canvas id="particleCanvas"></canvas>
        <div id="heartContainer">
            <canvas id="heartCanvas"></canvas>
        </div>
    </div>

    <script>
        // --- Setup Canvas Elements ---
        const starCanvas = document.getElementById('starCanvas');
        const starCtx = starCanvas.getContext('2d');

        const particleCanvas = document.getElementById('particleCanvas');
        const particleCtx = particleCanvas.getContext('2d');

        const heartCanvas = document.getElementById('heartCanvas');
        const heartCtx = heartCanvas.getContext('2d');

        const textToRepeat = "ILOVEYOUKAYE";

        let width, height;
        let stars = [];
        let particles = [];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;

            starCanvas.width = width;
            starCanvas.height = height;

            particleCanvas.width = width;
            particleCanvas.height = height;

            // Heart Canvas sizing (responsive bounding box)
            const minDim = Math.min(width, height);
            const heartSize = Math.max(300, Math.min(minDim * 0.85, 650));
            heartCanvas.width = heartSize;
            heartCanvas.height = heartSize;

            initStars();
            renderHeartText();
        }

        // --- Twinkling Background Stars ---
        function initStars() {
            stars = [];
            const count = Math.floor((width * height) / 3000);
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 1.5 + 0.3,
                    alpha: Math.random(),
                    speed: Math.random() * 0.015 + 0.005,
                    maxAlpha: Math.random() * 0.7 + 0.3
                });
            }
        }

        function drawStars() {
            starCtx.clearRect(0, 0, width, height);
            for (let star of stars) {
                star.alpha += star.speed;
                if (star.alpha > star.maxAlpha || star.alpha < 0.1) {
                    star.speed = -star.speed;
                }
                starCtx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, star.alpha)})`;
                starCtx.beginPath();
                starCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                starCtx.fill();
            }
        }

        // --- Floating Particles Around Heart ---
        function initParticles() {
            particles = [];
            const particleCount = 65;
            for (let i = 0; i < particleCount; i++) {
                particles.push(createParticle());
            }
        }

        function createParticle() {
            return {
                x: width / 2 + (Math.random() - 0.5) * (heartCanvas.width * 0.8),
                y: height / 2 + (Math.random() - 0.5) * (heartCanvas.height * 0.8),
                size: Math.random() * 2.5 + 1,
                vx: (Math.random() - 0.5) * 0.6,
                vy: -Math.random() * 0.8 - 0.3,
                alpha: Math.random() * 0.7 + 0.2,
                life: Math.random() * 100 + 100,
                maxLife: 200,
                color: Math.random() > 0.4 ? 'rgba(255, 100, 160,' : 'rgba(255, 180, 210,'
            };
        }

        function drawParticles() {
            particleCtx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;

                let currentAlpha = p.alpha * (p.life / p.maxLife);

                particleCtx.fillStyle = p.color + `${Math.max(0, currentAlpha)})`;
                particleCtx.shadowBlur = 8;
                particleCtx.shadowColor = "rgba(255, 105, 180, 0.8)";
                particleCtx.beginPath();
                particleCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                particleCtx.fill();
                particleCtx.shadowBlur = 0;

                if (p.life <= 0 || p.y < 0) {
                    particles[i] = createParticle();
                    particles[i].y = height / 2 + (Math.random() * 0.4 + 0.1) * heartCanvas.height;
                }
            }
        }

        // --- Render Heart Equation Grid with Text ---
        function inHeart(x, y) {
            // Heart Equation: ((x^2 + y^2 - 1)^3 - x^2 * y^3) <= 0
            // x in [-1.3, 1.3], y in [-1.1, 1.3] (flipped Y for canvas coordinate system)
            const term1 = x * x + y * y - 1;
            return (term1 * term1 * term1 - x * x * y * y * y) <= 0;
        }

        let shimmerTime = 0;

        function renderHeartText() {
            const hWidth = heartCanvas.width;
            const hHeight = heartCanvas.height;

            heartCtx.clearRect(0, 0, hWidth, hHeight);

            // Responsive grid density calculation
            const fontSize = Math.max(9, Math.floor(hWidth / 42));
            const stepX = fontSize * 0.72;
            const stepY = fontSize * 1.05;

            heartCtx.font = `bold ${fontSize}px "Segoe UI", Roboto, sans-serif`;
            heartCtx.textAlign = "center";
            heartCtx.textBaseline = "middle";

            let charIndex = 0;

            // Map canvas pixels to Math coordinates
            // Mathematical bounds: X from -1.35 to 1.35, Y from -1.1 to 1.35
            const scaleX = 1.35;
            const scaleY = 1.35;
            const centerX = hWidth / 2;
            const centerY = hHeight / 2 + fontSize * 0.8; // Minor offset for visual perfect center

            // Linear Gradient for smooth color transition top-to-bottom
            const gradient = heartCtx.createLinearGradient(0, 0, hWidth, hHeight);
            gradient.addColorStop(0.0, "#ff758c");
            gradient.addColorStop(0.35, "#ff2a6d");
            gradient.addColorStop(0.7, "#ff0055");
            gradient.addColorStop(1.0, "#d10043");

            for (let py = 12; py < hHeight - 12; py += stepY) {
                // Invert Y because canvas Y points downwards
                const mathY = -((py - centerY) / (hHeight / 2)) * scaleY;

                for (let px = 12; px < hWidth - 12; px += stepX) {
                    const mathX = ((px - centerX) / (hWidth / 2)) * scaleX;

                    if (inHeart(mathX, mathY)) {
                        const char = textToRepeat[charIndex % textToRepeat.length];
                        charIndex++;

                        // Shimmer effect calculation based on position and time wave
                        const distanceToCenter = Math.sqrt(mathX * mathX + mathY * mathY);
                        const shimmerOffset = Math.sin(shimmerTime * 3 + (px * 0.02) + (py * 0.02));
                        const isShimmer = shimmerOffset > 0.82;

                        if (isShimmer) {
                            heartCtx.fillStyle = '#ffffff';
                            heartCtx.shadowColor = '#ffffff';
                            heartCtx.shadowBlur = 12;
                        } else {
                            heartCtx.fillStyle = gradient;
                            heartCtx.shadowColor = 'rgba(255, 20, 100, 0.6)';
                            heartCtx.shadowBlur = 6;
                        }

                        heartCtx.fillText(char, px, py);
                    }
                }
            }
        }

        // --- Main Animation Loop (Target 60 FPS) ---
        function animate(timestamp) {
            shimmerTime = timestamp * 0.001;

            drawStars();
            drawParticles();
            renderHeartText();

            requestAnimationFrame(animate);
        }

        // --- Initialization ---
        window.addEventListener('resize', resize);

        resize();
        initParticles();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
